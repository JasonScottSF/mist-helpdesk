services:
  api:
    build: ./api
    restart: unless-stopped
    environment:
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      SESSION_TTL: ${SESSION_TTL:-28800}
    networks:
      - internal

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "${PORT:-5004}:80"
    depends_on:
      - api
    networks:
      - internal

networks:
  internal:
